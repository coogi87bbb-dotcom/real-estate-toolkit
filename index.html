<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Closer's Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans antialiased">

    <header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-wide text-emerald-400">CLOSER'S TOOLKIT</h1>
            <span class="text-xs bg-gray-800 px-2 py-1 rounded text-gray-400 font-mono">v1.0 - Active</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">

        <section class="bg-gray-900 border border-gray-800 rounded-xl p-6 shadow-xl">
            <div class="flex items-center space-x-2 mb-4">
                <span class="text-2xl">💰</span>
                <h2 class="text-lg font-bold tracking-tight">Quick Commission &amp; Net Sheet Calculator</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Property Sale Price ($)</label>
                        <input type="number" id="salePrice" placeholder="e.g. 450000" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500 font-mono">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Total Commission Rate (%)</label>
                        <input type="number" id="commRate" value="6" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500 font-mono">
                    </div>
                </div>
                
                <div class="bg-gray-950 border border-gray-800 rounded-lg p-4 flex flex-col justify-between">
                    <div>
                        <div class="text-xs font-semibold text-gray-400 uppercase">Estimated Total Commission</div>
                        <div id="totalCommDisplay" class="text-3xl font-black text-emerald-400 mt-1">$0</div>
                    </div>
                    <div class="border-t border-gray-800 pt-3 mt-3 grid grid-cols-2 gap-2 text-sm">
                        <div>
                            <span class="block text-xs text-gray-500">Listing Agent (3%):</span>
                            <span id="listingAgentShare" class="font-bold text-gray-300">$0</span>
                        </div>
                        <div>
                            <span class="block text-xs text-gray-500">Buying Agent (3%):</span>
                            <span id="buyingAgentShare" class="font-bold text-gray-300">$0</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-gray-900 border border-gray-800 rounded-xl p-6 shadow-xl">
            <div class="flex items-center space-x-2 mb-4">
                <span class="text-2xl">🤖</span>
                <h2 class="text-lg font-bold tracking-tight">Instant Property Pitch Generator</h2>
            </div>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Beds / Baths</label>
                        <input type="text" id="propertySpecs" placeholder="e.g. 3 bed, 2.5 bath" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Neighborhood / Key Feature</label>
                        <input type="text" id="propertyLocation" placeholder="e.g. Downtown, Huge Backyard" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500">
                    </div>
                </div>
                
                <button id="generateBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold p-3 rounded-lg transition duration-200 uppercase tracking-wider text-sm">
                    Generate AI Marketing Package
                </button>
                
                <div class="bg-gray-950 border border-gray-800 rounded-lg p-4 space-y-4 hidden" id="outputArea">
                    <div>
                        <span class="text-xs font-mono text-emerald-400 block mb-1">[🔥 High-Converting Listing Description]</span>
                        <p id="listingOutput" class="text-sm text-gray-300 bg-gray-900 p-3 rounded border border-gray-800"></p>
                    </div>
                    <div>
                        <span class="text-xs font-mono text-emerald-400 block mb-1">[📹 TikTok / IG Reel Script]</span>
                        <p id="scriptOutput" class="text-sm text-gray-300 bg-gray-900 p-3 rounded border border-gray-800"></p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        const salePriceInput = document.getElementById('salePrice');
        const commRateInput = document.getElementById('commRate');
        const totalCommDisplay = document.getElementById('totalCommDisplay');
        const listingAgentShare = document.getElementById('listingAgentShare');
        const buyingAgentShare = document.getElementById('buyingAgentShare');

        function calculateCommission() {
            const price = parseFloat(salePriceInput.value) || 0;
            const rate = parseFloat(commRateInput.value) || 0;
            
            const totalComm = price * (rate / 100);
            const splitComm = totalComm / 2;

            totalCommDisplay.innerText = '$' + totalComm.toLocaleString(undefined, {maximumFractionDigits: 0});
            listingAgentShare.innerText = '$' + splitComm.toLocaleString(undefined, {maximumFractionDigits: 0});
            buyingAgentShare.innerText = '$' + splitComm.toLocaleString(undefined, {maximumFractionDigits: 0});
        }

        salePriceInput.addEventListener('input', calculateCommission);
        commRateInput.addEventListener('input', calculateCommission);

        // Dummy interactive action for the AI generator button until API is wired
        document.getElementById('generateBtn').addEventListener('click', () => {
            const specs = document.getElementById('propertySpecs').value || "3 bed, 2 bath";
            const loc = document.getElementById('propertyLocation').value || "Prime Location";
            
            document.getElementById('outputArea').classList.remove('hidden');
            document.getElementById('listingOutput').innerText = `✨ JUST LISTED! Check out this stunning ${specs} located in the highly sought-after ${loc} neighborhood. Complete with premium finishes, an abundance of natural light, and unmatched charm. This property will not last long! DM for a private showing before it hits the MLS! 🔑`;
            document.getElementById('scriptOutput').innerText = `[Visual: Hooking the camera outside the front door]\n"Stop scrolling if you want to see what luxury looks like under market value. Today we are touring this brand new ${specs} right here in ${loc}..."`;
        });
    </script>
</body>
</html>
